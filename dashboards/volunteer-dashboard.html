<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Dashboard - FoodBridge</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
  <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .dashboard-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2rem;
      margin-top: 2rem;
    }
    @media (max-width: 768px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }
    .delivery-card {
      padding: 1.5rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      margin-bottom: 1rem;
      background: var(--color-white);
      transition: box-shadow var(--transition-fast);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .delivery-card:hover {
      box-shadow: var(--shadow-sm);
    }
    .route-info {
      font-size: 0.95rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="brand">FoodBridge</a>
      <div class="nav-links">
        <span id="user-greeting" style="font-weight: 600; color: var(--color-dark);"></span>
        
        <div class="notification-container">
          <button class="bell-btn" id="notification-bell" onclick="toggleNotifications()">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-bell"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            <span class="notification-badge" id="notification-badge">0</span>
          </button>
          <div class="notification-dropdown" id="notification-list" style="display: none;">
            <!-- Rendered by JS -->
          </div>
        </div>

        <button onclick="handleLogout()" class="btn btn-outline" style="padding: 0.35rem 0.75rem;">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container py-12">
    <h1>Delivery Dashboard</h1>
    <p>Manage and transport surplus food from donors to receivers. Accept available deliveries below.</p>

    <div class="dashboard-grid">
      <!-- Available Deliveries -->
      <div>
        <h2 style="font-size: 1.5rem; margin-bottom: 1rem;">Deliveries Need Partners</h2>
        <div id="deliveries-container">
          <!-- Rendered via JS -->
        </div>
      </div>

      <!-- My Active Deliveries -->
      <div>
        <div class="card card-body">
          <h2 style="font-size: 1.25rem; margin-bottom: 1.5rem;">My Active Routes</h2>
          <div id="volunteer-map" style="height: 250px; margin-bottom: 1.5rem; background: #eaeaea; border-radius: var(--radius-md); z-index: 1;"></div>
          <div id="my-deliveries-container">
            <!-- Rendered via JS -->
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

  <script src="../js/app.js"></script>
  <script src="../js/volunteer-dashboard.js"></script>
</body>
</html>
