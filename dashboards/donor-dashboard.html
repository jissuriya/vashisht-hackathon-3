<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donor Dashboard - FoodBridge</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 2rem;
      margin-top: 2rem;
    }
    @media (max-width: 768px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }
    .food-card {
      padding: 1rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      margin-bottom: 1rem;
      background: var(--color-white);
      transition: box-shadow var(--transition-fast);
    }
    .food-card:hover {
      box-shadow: var(--shadow-sm);
    }
    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="brand">FoodBridge</a>
      <div class="nav-links">
        <span id="user-greeting" style="font-weight: 600; color: var(--color-dark);"></span>
        
        <div class="notification-container">
          <button class="bell-btn" id="notification-bell" onclick="toggleNotifications()">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-bell"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            <span class="notification-badge" id="notification-badge">0</span>
          </button>
          <div class="notification-dropdown" id="notification-list" style="display: none;">
            <!-- Rendered by JS -->
          </div>
        </div>

        <button onclick="handleLogout()" class="btn btn-outline" style="padding: 0.35rem 0.75rem;">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container py-12">
    <h1>Donor Dashboard</h1>
    <p>Manage your surplus food donations and see their impact.</p>

    <!-- Personal Impact Section -->
    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 2rem; max-width: 600px;">
      <div class="stat-card" style="padding: 1rem;">
        <h3 id="donor-meals" style="font-size: 1.5rem;">0</h3>
        <p style="font-size: 0.75rem;">Meals Shared</p>
      </div>
      <div class="stat-card" style="padding: 1rem;">
        <h3 id="donor-co2" style="font-size: 1.5rem;">0kg</h3>
        <p style="font-size: 0.75rem;">CO₂ Prevented</p>
      </div>
    </div>

    <div class="dashboard-grid">
      <!-- Post New Food Form -->
      <div>
        <div class="card card-body">
          <h2 style="font-size: 1.25rem; margin-bottom: 1.5rem;">Post Surplus Food</h2>
          <form id="post-food-form">
            <div class="form-group">
              <label class="form-label" for="title">Food Item / Description</label>
              <input type="text" id="title" class="form-control" required placeholder="e.g. 50 Sandwiches">
            </div>
            
            <div style="display: flex; gap: 1rem;">
              <div class="form-group" style="flex: 1;">
                <label class="form-label" for="quantity">Quantity</label>
                <input type="number" id="quantity" class="form-control" required min="1">
              </div>
              <div class="form-group" style="flex: 1;">
                <label class="form-label" for="unit">Unit</label>
                <select id="unit" class="form-control">
                  <option value="items">Items / Portions</option>
                  <option value="kg">Kilograms (kg)</option>
                  <option value="lbs">Pounds (lbs)</option>
                  <option value="boxes">Boxes</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="expiry">Expiry Time</label>
              <input type="datetime-local" id="expiry" class="form-control" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="location">Pickup Location Text</label>
              <input type="text" id="location" class="form-control" required placeholder="e.g. 123 Main St">
            </div>

            <div class="form-group">
              <label class="form-label">Pin Exact Location</label>
              
              <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                <input type="text" id="map-search" class="form-control" placeholder="Search address...">
                <button type="button" id="btn-search" class="btn btn-outline" style="padding: 0.5rem 1rem;">Search</button>
                <button type="button" id="btn-location" class="btn btn-primary" style="padding: 0.5rem 1rem;" title="Use My GPS Location">📍 My Location</button>
              </div>

              <div id="map" style="height: 250px; background: #eaeaea; border-radius: var(--radius-md); z-index: 1;"></div>
              <p style="font-size: 0.8rem; color: var(--color-text-muted); margin-top: 0.5rem;">Drag the marker or click to set coordinates.</p>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Post Listing</button>
          </form>
        </div>
      </div>

      <!-- Active Listings -->
      <div>
        <div class="card card-body">
          <h2 style="font-size: 1.25rem; margin-bottom: 1.5rem;">Your Postings</h2>
          <div id="listings-container">
            <!-- Rendered via JS -->
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

  <script src="../js/app.js"></script>
  <script src="../js/donor-dashboard.js"></script>
</body>
</html>
