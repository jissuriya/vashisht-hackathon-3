<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodBridge - Login / Sign Up</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--color-light);">
  
  <div class="card animate-fade-in" style="width: 100%; max-width: 400px; padding: 2rem;">
    <div style="text-align: center; margin-bottom: 2rem;">
      <a href="index.html" class="brand" style="justify-content: center; font-size: 2rem;">
        FoodBridge
      </a>
      <p style="color: var(--color-text-muted); margin-top: 0.5rem;" id="form-subtitle">Login to your account</p>
    </div>

    <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
      <button class="btn btn-outline" style="flex: 1;" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="btn" style="flex: 1; background-color: transparent; color: var(--color-text);" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Auth Form -->
    <form id="auth-form">
      
      <!-- Signup Only Fields -->
      <div id="signup-fields" style="display: none;">
        <div class="form-group">
          <label class="form-label" for="name">Organization / Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="Green Cafe">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="role">Role</label>
          <select id="role" class="form-control">
            <option value="donor">Food Donor (Restaurant/Store)</option>
            <option value="receiver">Receiver (NGO/Food Bank)</option>
            <option value="volunteer">Delivery Partner (Transporter)</option>
          </select>
        </div>
      </div>

      <!-- Common Fields -->
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary btn-block mt-4" id="submit-btn" style="padding: 0.75rem;">
        Login
      </button>

      <!-- Dummy Login Hint -->
       <div style="margin-top: 1rem; font-size: 0.8rem; color: var(--color-text-muted); text-align: center;">
         <p>Testing Demo Accounts:</p>
         <p>donor@test.com / password</p>
         <p>receiver@test.com / password</p>
         <p>volunteer@test.com / password (Delivery Partner)</p>
       </div>
    </form>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
